<!DOCTYPE html>
<html>
<head>
<title>Statistics | ChronoPreCure</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background: url("{{ url_for('static', filename='images/dna-bg.png') }}") no-repeat center center fixed;
    background-size: cover;
}

.container{display:flex;min-height:100vh;}

.sidebar{
    width:260px;
    background:#0b2a4a;
    color:white;
    padding:25px;
    position:fixed;
    height:100vh;
}

.logo{display:flex;align-items:center;gap:12px;margin-bottom:30px;}
.logo img{width:45px;}

.sidebar a{
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
    margin-top:10px;
    border-radius:8px;
}
.sidebar a:hover{background:#1e4e8c;}

.bottom-links{
    position:absolute;
    bottom:20px;
    left:25px;
    right:25px;
}

.main{
    flex:1;
    margin-left:260px;
    padding:40px;
}

.card{
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

h1{color:#0b2a4a;margin-bottom:10px;}

.disease-name{
    font-size:28px;
    color:#2563eb;
    margin-bottom:10px;
}

.risk-high{color:red;font-weight:bold;}
.risk-medium{color:orange;font-weight:bold;}
.risk-low{color:green;font-weight:bold;}

.chart-row{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:40px;
}

.chart-box{width:300px;}
</style>
</head>

<body>
<div class="container">

<div class="sidebar">
    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}">
        <h2>ChronoPreCure</h2>
    </div>

    <a href="/dashboard">Home</a>
    <a href="/assessment">New Assessment</a>
    <a href="/statistics">Statistics</a>
    <a href="/overview">Body Overview</a>
    <a href="/settings">Settings</a>

    <div class="bottom-links">
        <a href="/profile">👤 Profile</a>
        <a href="/logout">🚪 Logout</a>
    </div>
</div>

<div class="main">
<div class="card">

<h1>Health Statistics Overview</h1>

{% if data %}

<div class="disease-name">{{ data.disease }}</div>

<p>
Risk Level:
<span id="riskText">{{ data.risk }}</span>
</p>

<div class="chart-row">
<div class="chart-box">
<canvas id="barChart"></canvas>
</div>

<div class="chart-box">
<canvas id="pieChart"></canvas>
</div>
</div>

<script>

// Get risk from Flask safely
var riskLevel = "{{ data.risk }}";
var riskScore = 25;

if (riskLevel === "High") {
    riskScore = 80;
    document.getElementById("riskText").className = "risk-high";
}
else if (riskLevel === "Medium") {
    riskScore = 55;
    document.getElementById("riskText").className = "risk-medium";
}
else {
    riskScore = 25;
    document.getElementById("riskText").className = "risk-low";
}

// Bar Chart
new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
        labels:["Risk Score"],
        datasets:[{
            data:[riskScore],
            backgroundColor:"#2563eb"
        }]
    },
    options:{
        scales:{
            y:{
                beginAtZero:true,
                max:100
            }
        }
    }
});

// Pie Chart
new Chart(document.getElementById("pieChart"),{
    type:"pie",
    data:{
        labels:["Risk","Safe"],
        datasets:[{
            data:[riskScore,100-riskScore],
            backgroundColor:["#ef4444","#10b981"]
        }]
    }
});

</script>

{% else %}
<p>No statistics available. Please complete assessment first.</p>
{% endif %}

</div>
</div>
</div>

</body>
</html>
