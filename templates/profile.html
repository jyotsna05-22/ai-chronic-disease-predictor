<!DOCTYPE html>
<html>
<head>
    <title>Profile | ChronoPreCure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: url("{{ url_for('static', filename='images/dna-bg.png') }}") no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #0b2a4a;
            color: white;
            padding: 25px;
            position: fixed;
            height: 100vh;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .logo img {
            width: 45px;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            margin-top: 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #1e4e8c;
        }

        .bottom-links {
            position: absolute;
            bottom: 20px;
            left: 25px;
            right: 25px;
        }

        .main {
            flex: 1;
            padding: 40px;
            margin-left: 260px;
        }

        .profile-card {
            background: #f7f7f7;
            border-radius: 28px;
            padding: 50px 45px;
            max-width: 1030px;
            margin: auto;
        }

        .profile-card h1 {
            color: #0b2a4a;
            font-size: 34px;
            margin-bottom: 30px;
        }

        .row {
            display: grid;
            grid-template-columns: 220px 1fr;
            align-items: center;
            gap: 35px;
            padding: 18px 0;
            border-bottom: 1px solid #e7e7e7;
        }

        .row label {
            font-size: 22px;
            font-weight: bold;
            color: #0b2a4a;
        }

        .row input {
            width: 100%;
            padding: 14px 16px;
            border: 3px solid #d7e1f2;
            border-radius: 16px;
            font-size: 20px;
            outline: none;
            background: white;
        }

        .row input[readonly] {
            background: #eceef3;
            color: #444;
        }

        .save-btn {
            margin-top: 32px;
            background: #2f66e0;
            color: white;
            border: none;
            padding: 16px 34px;
            border-radius: 18px;
            font-size: 18px;
            cursor: pointer;
        }

        .save-btn:hover {
            background: #1f55cb;
        }

        .note {
            margin-top: 20px;
            color: #555;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
            <h2>ChronoPreCure</h2>
        </div>

        <a href="{{ url_for('dashboard') }}">Home</a>
        <a href="{{ url_for('assessment') }}">New Assessment</a>
        <a href="{{ url_for('statistics') }}">Statistics</a>
        <a href="{{ url_for('overview') }}">Body Overview</a>
        <a href="{{ url_for('settings') }}">Settings</a>

        <div class="bottom-links">
            <a href="{{ url_for('profile') }}">👤 {{ profile.name }}</a>
            <a href="{{ url_for('logout') }}">🚪 Logout</a>
        </div>
    </div>

    <div class="main">
        <div class="profile-card">
            <h1>User Profile</h1>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <script>
                        alert("Your details updated successfully!");
                    </script>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('profile') }}">
                <div class="row">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" value="{{ profile.name }}">
                </div>

                <div class="row">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="{{ profile.email }}">
                </div>

                <div class="row">
                    <label for="age">Age</label>
                    <input type="text" id="age" name="age" value="{{ profile.age }}">
                </div>

                <div class="row">
                    <label for="height">Height</label>
                    <input type="text" id="height" name="height" value="{{ profile.height }}">
                </div>

                <div class="row">
                    <label for="weight">Weight</label>
                    <input type="text" id="weight" name="weight" value="{{ profile.weight }}">
                </div>

                <div class="row">
                    <label for="member_since">Member Since</label>
                    <input type="text" id="member_since" value="{{ profile.member_since }}" readonly>
                </div>

                <button type="submit" class="save-btn">Save Profile</button>
            </form>

            <p class="note">Update your profile details and click Save Profile to store them.</p>
        </div>
    </div>
</div>

</body>
</html>
