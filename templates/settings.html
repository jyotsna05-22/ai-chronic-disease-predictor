<!DOCTYPE html>
<html>
<head>
<title>Settings | ChronoPreCure</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* ✅ SAME DNA BACKGROUND */
body{
    background: url("{{ url_for('static', filename='images/dna-bg.png') }}") no-repeat center center fixed;
    background-size: cover;
}

.container{
    display:flex;
    min-height:100vh;
}

/* ✅ SAME SIDEBAR */
.sidebar{
    width:260px;
    background:#0b1f3a;
    color:white;
    padding:25px;
    position:fixed;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:30px;
}

.logo img{
    width:45px;
}

.sidebar a{
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
    margin-top:10px;
    border-radius:8px;
}

.sidebar a:hover{
    background:#1f3c66;
}

.bottom-links{
    margin-top:auto;
}

/* ✅ SAME MAIN STRUCTURE */
.main{
    flex:1;
    padding:40px;
    color:white;
    margin-left:260px;
}

.top-bar{
    display:flex;
    justify-content:flex-end;
    gap:20px;
    font-size:22px;
}

.icon{cursor:pointer;}

/* SETTINGS CARDS */
.settings-card{
    background:#2563eb;
    border-radius:20px;
    padding:30px;
    margin-top:30px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.settings-card h3{
    margin-bottom:20px;
}

.settings-card label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

.settings-card input,
.settings-card select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-top:5px;
}

.save-btn{
    margin-top:25px;
    padding:14px 28px;
    background:white;
    color:#2563eb;
    border:none;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
}

.save-btn:hover{
    background:#f0f0f0;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}">
        <h2>ChronoPreCure</h2>
    </div>

    <a href="{{ url_for('dashboard') }}">Home</a>
    <a href="{{ url_for('assessment') }}">New Assessment</a>
    <a href="{{ url_for('statistics') }}">Statistics</a>
    <a href="{{ url_for('overview') }}">Body Overview</a>
    <a href="{{ url_for('settings') }}">Settings</a>

    <div class="bottom-links">
        <a href="{{ url_for('profile') }}">👤 Profile</a>
        <a href="{{ url_for('logout') }}">🚪 Logout</a>
    </div>

</div>

<div class="main">

<div class="top-bar">
    <span class="icon">🔔</span>
    <span class="icon">📩</span>
</div>

<h1 style="margin-top:20px;">Account Settings</h1>

<!-- PROFILE SETTINGS -->
<div class="settings-card">
<h3>Profile Information</h3>

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Age</label>
<input type="number">

<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<!-- DIET SETTINGS -->
<div class="settings-card">
<h3>Diet Preferences</h3>

<label>Diet Type</label>
<select>
<option>Vegetarian</option>
<option>Non-Vegetarian</option>
<option>Vegan</option>
</select>

<label>Allergies</label>
<input type="text" placeholder="Peanuts, Dairy...">

<label>Daily Calorie Goal</label>
<input type="number">

<button class="save-btn" onclick="saveSettings()">Save Changes</button>
</div>

</div>
</div>

<script>
function saveSettings(){
    alert("Settings Saved Successfully!");
}
</script>

</body>
</html>
